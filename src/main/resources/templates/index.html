<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to ChatApp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FF4444 0%, #AA00FF 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .welcome-container {
            background: #1E1E1E;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #FF4444, #AA00FF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        
        .logo p {
            color: #A0A0A0;
            font-size: 0.9rem;
        }
        
        .input-group {
            margin-bottom: 25px;
        }
        
        .input-group label {
            display: block;
            color: #E9EDEF;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: #2A2A2A;
            border: 1px solid #3A3A3A;
            border-radius: 10px;
            color: #E9EDEF;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #FF4444;
            box-shadow: 0 0 0 2px rgba(255,68,68,0.2);
        }
        
        .input-group input::placeholder {
            color: #667781;
        }
        
        .join-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #FF4444, #AA00FF);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .join-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(170,0,255,0.4);
        }
        
        .error-message {
            background: rgba(255,68,68,0.1);
            border-left: 3px solid #FF4444;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
            color: #FF4444;
            font-size: 0.9rem;
        }
        
        .info-text {
            text-align: center;
            margin-top: 20px;
            color: #667781;
            font-size: 0.8rem;
        }
        
        .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .feature {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #667781;
            font-size: 0.8rem;
        }
        
        .feature span {
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <div class="logo">
            <h1>💬 ChatApp</h1>
            <p>Connect. Chat. Call.</p>
        </div>
        
        <form action="/join" method="post">
            <div class="input-group">
                <label>👤 Your Name</label>
                <input type="text" 
                       name="username" 
                       placeholder="Enter your name to join..." 
                       required
                       autocomplete="off"
                       autofocus>
            </div>
            
            <button type="submit" class="join-btn">🚀 Join Chat</button>
        </form>
        
        <div class="features">
            <div class="feature"><span>💬</span> Global Chat</div>
            <div class="feature"><span>🔒</span> Private Rooms</div>
            <div class="feature"><span>📷</span> Images</div>
            <div class="feature"><span>🎤</span> Audio Calls</div>
            <div class="feature"><span>📹</span> Video Calls</div>
        </div>
        
        <div class="info-text">
            ✨ Join the conversation with anyone, anywhere!
        </div>
    </div>
</body>
</html>
