<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jyoti's ❤️ World</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
    <div id="username-page" class="page-overlay">
        <div class="glass-card login-card">
            <i class="fas fa-heart heart-logo"></i>
            <h1>Jyoti Chat</h1>
            <form id="usernameForm">
                <input type="text" id="name" placeholder="Enter your name..." required autocomplete="off" />
                <button type="submit" class="btn-primary">Join Chat</button>
            </form>
        </div>
    </div>

    <div id="chat-page" class="hidden">
        <div class="app-shell">
            <header class="chat-header">
                <div class="h-left">
                    <button id="mobile-menu-toggle" class="icon-btn"><i class="fas fa-users"></i></button>
                    <div class="chat-meta">
                        <h2>Jyoti Chat</h2>
                        <span class="status"><span class="dot"></span> <span id="online-count">1</span> online</span>
                    </div>
                </div>
                <div class="h-right">
                    <button id="theme-toggle" class="icon-btn"><i class="fas fa-moon"></i></button>
                    <div class="avatar" id="header-avatar">?</div>
                </div>
            </header>

            <div class="main-body">
                <aside id="chat-sidebar" class="sidebar">
                    <div class="sidebar-label">Online Lovers</div>
                    <div id="onlineUsers" class="user-list"></div>
                </aside>

                <main class="chat-area">
                    <ul id="messageArea" class="message-list"></ul>
                    
                    <form id="messageForm" class="input-form">
                        <button type="button" id="emojiBtn" class="icon-btn"><i class="far fa-smile"></i></button>
                        <input type="text" id="message" placeholder="Type a message..." autocomplete="off" />
                        <button type="submit" class="send-btn"><i class="fas fa-paper-plane"></i></button>
                    </form>
                </main>
            </div>
        </div>
        <div id="sidebar-overlay" class="overlay hidden"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.1.4/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
