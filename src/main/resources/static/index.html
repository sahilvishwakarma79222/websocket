<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JyoSah - Professional Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css" />
</head>
<body>

    <!-- Login Page (Manual Entry) -->
    <div id="login-page" class="page-container">
        <div class="login-card">
            <div class="brand-logo">
                <i class="fas fa-comments"></i>
            </div>
            <h1>JyoSah<span class="dot-red">.</span></h1>
            <p class="brand-tagline">Professional Chat</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="login-username" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="login-password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-primary">Login →</button>
            </form>
        </div>
    </div>

    <!-- Username Page (After Login) -->
    <div id="username-page" class="page-container hidden">
        <div class="login-card">
            <div class="brand-logo small">
                <i class="fas fa-heart"></i>
            </div>
            <h2>Welcome to JyoSah</h2>
            <p class="setup-hint">Apna naam daalein</p>
            <form id="usernameForm">
                <div class="input-group">
                    <i class="fas fa-pen"></i>
                    <input type="text" id="name" placeholder="Aapka naam kya hai?" required autocomplete="off" />
                </div>
                <button type="submit" class="btn-primary">Join Chat →</button>
            </form>
        </div>
    </div>

    <!-- Main Chat Page -->
    <div id="chat-page" class="page-container hidden">
        <header class="app-header">
            <div class="header-left">
                <button id="mobile-menu-toggle" class="icon-btn"><i class="fas fa-users"></i></button>
                <div class="title-meta">
                    <h2>JyoSah<span class="dot-red">.</span></h2>
                    <span class="online-status"><span class="dot"></span> <span id="online-count">1</span> online</span>
                </div>
            </div>
            <div class="header-right">
                <button id="theme-toggle" class="icon-btn"><i class="fas fa-moon"></i></button>
                <div class="avatar" id="header-avatar">?</div>
            </div>
        </header>

        <div class="main-content">
            <aside id="chat-sidebar" class="sidebar">
                <div class="sidebar-header">
                    <i class="fas fa-users"></i>
                    <span>Online Members</span>
                </div>
                <div id="onlineUsers" class="user-list">
                    <!-- Users will appear here -->
                </div>
            </aside>

            <div class="chat-view">
                <ul id="messageArea" class="message-list">
                    <li class="event-msg">👋 Welcome to JyoSah Chat!</li>
                </ul>

                <div id="typingIndicator" class="typing-box hidden">
                    <span id="typingText"></span>
                </div>

                <form id="messageForm" class="input-form">
                    <button type="button" id="emojiBtn" class="icon-btn"><i class="far fa-smile"></i></button>
                    <input type="text" id="message" placeholder="Type a message..." autocomplete="off" />
                    <button type="submit" class="send-btn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>
        <div id="sidebar-overlay" class="overlay hidden"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.1.4/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
