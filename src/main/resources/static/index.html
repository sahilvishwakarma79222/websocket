<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat Karo Re - Modern Chat Application</title>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts - Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/main.css" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23667eea'%3E%3Cpath d='M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4c0-1.1-.9-2-2-2z'/%3E%3C/svg%3E">
</head>
<body>
    <noscript>
        <div class="no-script">
            <h2>⚠️ JavaScript is required</h2>
            <p>Please enable JavaScript to use this chat application.</p>
        </div>
    </noscript>

    <!-- Username Page -->
    <div id="username-page" class="username-page">
        <div class="username-page-container glass-effect">
            <div class="logo-container">
                <i class="fas fa-comments"></i>
            </div>
            <h1 class="title">Kaun Hai Tu? <span class="highlight">???????</span></h1>
            <p class="subtitle">Enter your username to join the chat</p>
            <form id="usernameForm" name="usernameForm">
                <div class="form-group">
                    <div class="input-icon-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="name" placeholder="Username" autocomplete="off" class="form-control" />
                    </div>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary username-submit">
                        <span>GET IN</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </form>
            <div class="login-info">
                <i class="fas fa-info-circle"></i>
                <span>Join the conversation!</span>
            </div>
        </div>
    </div>

    <!-- Chat Page -->
    <div id="chat-page" class="hidden">
        <div class="chat-container">
            <!-- Chat Header -->
            <div class="chat-header glass-effect">
                <div class="header-left">
                    <div class="chat-info">
                        <h2><i class="fas fa-comment-dots"></i> Chat Karo Re !</h2>
                        <div class="online-status">
                            <span class="online-dot"></span>
                            <span id="online-count">1</span> online
                        </div>
                    </div>
                </div>
                <div class="header-right">
                    <!-- NOTIFICATION TOGGLE BUTTON - ADDED HERE -->
                    <button id="notification-toggle" class="icon-btn" title="Turn off notifications">
                        <i class="fas fa-bell"></i>
                    </button>
                    
                    <button id="theme-toggle" class="icon-btn" title="Toggle dark mode">
                        <i class="fas fa-moon"></i>
                    </button>
                    <div class="user-profile">
                        <div class="avatar" id="header-avatar">U</div>
                    </div>
                </div>
            </div>

            <!-- Main Chat Area -->
            <div class="chat-main">
                <!-- Sidebar - Online Users -->
                <div class="chat-sidebar glass-effect">
                    <div class="sidebar-header">
                        <h3><i class="fas fa-users"></i> Online</h3>
                    </div>
                    <div class="online-users" id="onlineUsers">
                        <!-- Users will be added here dynamically -->
                    </div>
                </div>

                <!-- Messages Area -->
                <div class="chat-content">
                    <div class="connecting">
                        <div class="connecting-spinner"></div>
                        <span>Connecting...</span>
                    </div>
                    
                    <ul id="messageArea" class="message-area">
                        <!-- Messages will appear here -->
                    </ul>

                    <!-- Typing Indicator -->
                    <div id="typingIndicator" class="typing-indicator hidden">
                        <div class="typing-dots">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                        <span id="typingText">Someone is typing...</span>
                    </div>

                    <!-- Message Input Form -->
                    <form id="messageForm" name="messageForm" class="message-form">
                        <div class="input-group">
                            <button type="button" class="icon-btn" id="emojiBtn" title="Add emoji">
                                <i class="far fa-smile"></i>
                            </button>
                            <button type="button" class="icon-btn" id="attachBtn" title="Attach file">
                                <i class="fas fa-paperclip"></i>
                            </button>
                            <input type="text" id="message" placeholder="Type a message..." autocomplete="off" class="form-control" />
                            <button type="submit" class="btn btn-primary send-btn">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.1.4/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
