<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jyoti ❤️ Chat</title>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
    <!-- Username Page -->
    <div id="username-page" class="username-page">
        <div class="username-page-container glass-effect">
            <div class="logo-container">
                <i class="fas fa-heart"></i>
            </div>
            <h1 class="title">Jyoti ❤️ Ka Chat</h1>
            <p class="subtitle">Enter your name to join</p>
            <form id="usernameForm" name="usernameForm">
                <div class="form-group">
                    <div class="input-icon-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="name" placeholder="Your name" autocomplete="off" class="form-control" />
                    </div>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary username-submit">
                        <span>Join Chat</span>
                        <i class="fas fa-heart"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Chat Page -->
    <div id="chat-page" class="hidden">
        <div class="chat-container">
            <!-- Chat Header -->
            <div class="chat-header glass-effect">
                <div class="header-left">
                    <div class="chat-info">
                        <h2><i class="fas fa-heart" style="color: #ff6b6b;"></i> Jyoti Chat</h2>
                        <div class="online-status">
                            <span class="online-dot"></span>
                            <span id="online-count">1</span> online
                        </div>
                    </div>
                </div>
                <div class="header-right">
                    <button id="notification-toggle" class="icon-btn" title="Notifications">
                        <i class="fas fa-bell"></i>
                    </button>
                    <button id="theme-toggle" class="icon-btn" title="Theme">
                        <i class="fas fa-moon"></i>
                    </button>
                    <div class="user-profile">
                        <div class="avatar" id="header-avatar">J</div>
                    </div>
                </div>
            </div>

            <!-- Main Chat Area -->
            <div class="chat-main">
                <!-- Mobile Menu Toggle -->
                <button id="mobile-menu-toggle" class="mobile-menu-btn">
                    <i class="fas fa-users"></i>
                </button>

                <!-- Sidebar - Online Users -->
                <div class="chat-sidebar glass-effect" id="chat-sidebar">
                    <div class="sidebar-header">
                        <h3><i class="fas fa-heart" style="color: #ff6b6b;"></i> Online Lovers</h3>
                    </div>
                    <div class="online-users" id="onlineUsers"></div>
                </div>

                <!-- Messages Area -->
                <div class="chat-content">
                    <div class="connecting hidden">
                        <div class="connecting-spinner"></div>
                        <span>Connecting...</span>
                    </div>
                    
                    <ul id="messageArea" class="message-area">
                        <!-- Welcome Message -->
                        <li class="event-message">
                            <p>❤️ Welcome to Jyoti's Chat! ❤️</p>
                        </li>
                    </ul>

                    <!-- Typing Indicator -->
                    <div id="typingIndicator" class="typing-indicator hidden">
                        <div class="typing-dots">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                        <span id="typingText">Someone is typing...</span>
                    </div>

                    <!-- Message Input Form - FIXED FOR MOBILE -->
                    <form id="messageForm" name="messageForm" class="message-form">
                        <div class="input-group">
                            <button type="button" class="icon-btn" id="emojiBtn" title="Emoji">
                                <i class="far fa-smile"></i>
                            </button>
                            <input type="text" id="message" placeholder="Type a message..." autocomplete="off" class="form-control" />
                            <button type="submit" class="send-btn">
                                <i class="fas fa-paper-plane"></i>
                                <span class="send-text">Send</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.1.4/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
