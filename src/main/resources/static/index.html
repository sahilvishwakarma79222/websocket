<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jyoti's ❤️ Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css" />
</head>
<body>

    <div id="username-page" class="page-container">
        <div class="login-card">
            <div class="heart-pulse"><i class="fas fa-heart"></i></div>
            <h1>Jyoti ❤️ Chat</h1>
            <form id="usernameForm">
                <input type="text" id="name" placeholder="Apna naam likhein..." required autocomplete="off" />
                <button type="submit" class="btn-main">Join Chat</button>
            </form>
        </div>
    </div>

    <div id="chat-page" class="page-container hidden">
        <header class="app-header">
            <div class="header-left">
                <button id="mobile-menu-toggle" class="icon-btn"><i class="fas fa-users"></i></button>
                <div class="title-meta">
                    <h2>Jyoti Chat</h2>
                    <span class="online-status"><span class="dot"></span> <span id="online-count">1</span> Online</span>
                </div>
            </div>
            <div class="header-right">
                <button id="theme-toggle" class="icon-btn"><i class="fas fa-moon"></i></button>
                <div class="avatar" id="header-avatar">?</div>
            </div>
        </header>

        <div class="main-content">
            <aside id="chat-sidebar" class="sidebar">
                <div class="sidebar-label">Online Members</div>
                <div id="onlineUsers" class="user-list"></div>
            </aside>

            <div class="chat-view">
                <ul id="messageArea" class="message-list">
                    <li class="event-msg">❤️ Welcome to Jyoti's Chat! ❤️</li>
                </ul>

                <div id="typingIndicator" class="typing-box hidden">
                    <span id="typingText">Someone is typing...</span>
                </div>

                <form id="messageForm" class="input-form">
                    <button type="button" id="emojiBtn" class="icon-btn"><i class="far fa-smile"></i></button>
                    <input type="text" id="message" placeholder="Type a message..." autocomplete="off" />
                    <button type="submit" class="send-btn"><i class="fas fa-paper-plane"></i></button>
                </form>
            </div>
        </div>
        <div id="sidebar-overlay" class="overlay hidden"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.1.4/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
