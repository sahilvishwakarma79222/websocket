# Ye change zaroori hai
server.port=5672
#server.address=192.168.0.106
# server.address hata do (Render ise handle karega)
server.address=192.168.1.220
# Baki aapka scheduler setup sahi hai
spring.task.scheduling.pool.size=2
spring.task.scheduling.thread-name-prefix=chat-cleanup-

# Memory bachane ke liye ye do lines add kar lo
spring.main.lazy-initialization=true
server.tomcat.threads.max=10

logging.level.com.alibou.websocket.config.ChatCleanupScheduler=INFO